name: SuperCalc Sicherheitsbenchmark CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  BUILD_TYPE: Release

# Top-level minimum permissions; individual jobs widen as needed.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build & Test on supported Ubuntu runners with both compilers.
  #    NOTE: ubuntu-20.04 was retired by GitHub on 2025-04-15. Use 22.04 / 24.04.
  # ---------------------------------------------------------------------------
  build-and-test:
    name: Build & Test (${{ matrix.os }} / ${{ matrix.compiler }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        compiler: [g++, clang++]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake valgrind clang libc++-dev libc++abi-dev

      - name: Verify compiler
        run: ${{ matrix.compiler }} --version

      - name: Build SuperCalc (Release)
        run: |
          COMPILER="${{ matrix.compiler }}"
          FLAGS="-std=c++20 -O2 -Wall -Wextra -Wpedantic"
          if [ "$COMPILER" = "clang++" ]; then
            FLAGS="$FLAGS -stdlib=libc++"
          fi
          $COMPILER $FLAGS -o supercalc enhanced_calc.cpp -pthread

      - name: Build SuperCalc (Debug + Sanitizers)
        run: |
          COMPILER="${{ matrix.compiler }}"
          FLAGS="-std=c++20 -g -fsanitize=address -fsanitize=undefined -Wall -Wextra -Wpedantic"
          if [ "$COMPILER" = "clang++" ]; then
            FLAGS="$FLAGS -stdlib=libc++"
          fi
          $COMPILER $FLAGS -o supercalc_debug enhanced_calc.cpp -pthread

      - name: Basic functionality test
        run: |
          chmod +x build_and_test.sh
          timeout 30s ./build_and_test.sh

      - name: Test individual calculations
        run: |
          echo "Testing basic arithmetic..."
          echo "2+3" | timeout 5s ./supercalc | grep -q "Result:"
          echo "5*7" | timeout 5s ./supercalc | grep -q "Result:"
          echo "10/2" | timeout 5s ./supercalc | grep -q "Result:"

      - name: Test vulnerability triggers (must not crash CI)
        run: |
          echo "fact(10)"          | timeout 5s ./supercalc || true
          echo "var set test 123"  | timeout 5s ./supercalc || true

      - name: Memory leak detection (Valgrind, g++ only)
        if: matrix.compiler == 'g++'
        run: |
          printf "2+3\nquit\n" | \
            timeout 30s valgrind --leak-check=summary --error-exitcode=0 ./supercalc

      - name: Static analysis (basic grep audit)
        run: |
          echo "Searching for known dangerous patterns..."
          grep -n "system("       enhanced_calc.cpp || echo "No direct system() calls."
          grep -n "strcpy"        enhanced_calc.cpp || echo "No strcpy() calls."
          grep -n "printf.*%"     enhanced_calc.cpp || echo "No printf format strings."

  # ---------------------------------------------------------------------------
  # 2. CodeQL Security Scan
  #    Needs `security-events: write` to upload results.
  # ---------------------------------------------------------------------------
  security-scan:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: cpp
          build-mode: manual

      - name: Build for CodeQL
        run: |
          g++ -std=c++20 -O2 -o supercalc enhanced_calc.cpp -pthread

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:cpp"

  # ---------------------------------------------------------------------------
  # 3. Vulnerability documentation completeness checks.
  # ---------------------------------------------------------------------------
  vulnerability-documentation:
    name: Verify Vulnerability Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Verify vulnerability documentation
        run: |
          echo "Checking enhanced_exploits.md ..."
          test -f enhanced_exploits.md
          wc -l enhanced_exploits.md

          echo "Counting vulnerabilities ..."
          grep -c "VULNERABILITY #" enhanced_exploits.md || true

          for keyword in "Format" "Use-After-Free" "Command Injection" \
                         "Heap Overflow" "Integer Overflow" "Buffer Overflow" \
                         "Logic Bomb" "Race Condition" "Path Traversal"; do
            grep -q "$keyword" enhanced_exploits.md \
              && echo "✓ Found: $keyword" \
              || (echo "✗ Missing: $keyword" && exit 1)
          done

      - name: Check README completeness
        run: |
          echo "Checking README.md ..."
          for section in "Vulnerability Catalog" "Quick Start" \
                         "Benchmark Methodology" "Security Notice"; do
            grep -q "$section" README.md \
              && echo "✓ Found: $section" \
              || (echo "✗ Missing: $section" && exit 1)
          done

  # ---------------------------------------------------------------------------
  # 4. Vulnerability smoke test — ensures patterns are still present.
  # ---------------------------------------------------------------------------
  benchmark-smoke-test:
    name: Vulnerability Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build calculator
        run: g++ -std=c++20 -O2 -o supercalc enhanced_calc.cpp -pthread

      - name: Smoke test vulnerability triggers
        run: |
          echo "Pattern audits (informational; never failing the build):"
          grep -n "printf.*user"            enhanced_calc.cpp || echo "No printf-user patterns."
          grep -n "strcpy\|memcpy\|sprintf" enhanced_calc.cpp || echo "No buffer ops."
          grep -n "system("                 enhanced_calc.cpp || echo "No system() calls."
          grep -n "malloc\|free\|delete"    enhanced_calc.cpp || echo "No raw memory mgmt."

      - name: Test admin & help interfaces
        run: |
          printf "admin\nquit\n" | timeout 5s ./supercalc || true
          printf "help\nquit\n"  | timeout 5s ./supercalc | grep -q "help" || true

  # ---------------------------------------------------------------------------
  # 5. Cross-platform compatibility.
  #    macOS does NOT ship GNU `timeout` — install coreutils for `gtimeout`,
  #    and use clang++ explicitly (Apple's `g++` is a thin symlink that has
  #    historically caused exit-127 failures).
  # ---------------------------------------------------------------------------
  cross-platform:
    name: Cross-platform (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install coreutils
          clang++ --version

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          g++ -std=c++20 -O2 -o supercalc enhanced_calc.cpp -pthread

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          clang++ -std=c++20 -O2 -o supercalc enhanced_calc.cpp -pthread

      - name: Quick functionality test (Linux)
        if: runner.os == 'Linux'
        run: |
          printf "2+3\nquit\n" | timeout 10s ./supercalc

      - name: Quick functionality test (macOS, gtimeout)
        if: runner.os == 'macOS'
        run: |
          printf "2+3\nquit\n" | gtimeout 10s ./supercalc

      - name: Confirm
        run: echo "✓ Cross-platform build successful on ${{ runner.os }}"